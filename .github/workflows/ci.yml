name: Flutter CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Format, Analyze, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Show Flutter & Dart version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Firebase options
        run: |
          if [ -z "${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}" ]; then
            echo "Missing FIREBASE_OPTIONS_DART_BASE64 secret"
            exit 1
          fi

          printf '%s' "${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Check Dart format
        run: dart format --output=none --set-exit-if-changed lib test pigeons
        # Only scan Dart-related folders, do not touch android/ios/build.

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug