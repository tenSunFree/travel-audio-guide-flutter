name: Flutter CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Format, Analyze, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Show Flutter & Dart version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Firebase config files
        run: |
          for v in FIREBASE_OPTIONS_STAGING_DART_BASE64 FIREBASE_OPTIONS_PRODUCTION_DART_BASE64 \
                   GOOGLE_SERVICES_JSON_STAGING_BASE64 GOOGLE_SERVICES_JSON_PRODUCTION_BASE64; do
            if [ -z "${!v}" ]; then
              echo "Missing secret: $v"
              exit 1
            fi
          done

          mkdir -p android/app/src/staging android/app/src/production
          mkdir -p lib/config/firebase

          printf '%s' "$FIREBASE_OPTIONS_STAGING_DART_BASE64" | base64 --decode > lib/config/firebase/firebase_options_staging.dart
          printf '%s' "$FIREBASE_OPTIONS_PRODUCTION_DART_BASE64" | base64 --decode > lib/config/firebase/firebase_options_production.dart
          printf '%s' "$GOOGLE_SERVICES_JSON_STAGING_BASE64" | base64 --decode > android/app/src/staging/google-services.json
          printf '%s' "$GOOGLE_SERVICES_JSON_PRODUCTION_BASE64" | base64 --decode > android/app/src/production/google-services.json
        env:
          FIREBASE_OPTIONS_STAGING_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_STAGING_DART_BASE64 }}
          FIREBASE_OPTIONS_PRODUCTION_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_PRODUCTION_DART_BASE64 }}
          GOOGLE_SERVICES_JSON_STAGING_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_STAGING_BASE64 }}
          GOOGLE_SERVICES_JSON_PRODUCTION_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_PRODUCTION_BASE64 }}

      - name: Format generated Firebase config files
        run: dart format lib/config/firebase/firebase_options_staging.dart lib/config/firebase/firebase_options_production.dart

      - name: Check Dart format
        run: dart format --output=none --set-exit-if-changed lib test pigeons
        # Only scan Dart-related folders, do not touch android/ios/build.

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build staging debug APK
        run: |
          flutter build apk --debug \
            --flavor staging \
            -t lib/main_staging.dart

      - name: Build production debug APK
        run: |
          flutter build apk --debug \
            --flavor production \
            -t lib/main_production.dart