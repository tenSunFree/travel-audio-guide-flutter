name: Flutter CD

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: flutter-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 'v*.*.*' is a glob pattern, which will also match v1.0.5-rc.1,
      # So we need to block tags in the unofficial format here to prevent the RC from accidentally entering the official release process.
      - name: Validate production tag
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid production tag: ${{ github.ref_name }}"
            echo "Expected format: v1.0.5"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Show Flutter & Dart version
        run: flutter --version

      - name: Restore Firebase config files
        run: |
          mkdir -p android/app/src/production
          printf '%s' "$FIREBASE_OPTIONS_PRODUCTION_DART_BASE64" | base64 --decode > lib/firebase_options_production.dart
          printf '%s' "$GOOGLE_SERVICES_JSON_PRODUCTION_BASE64" | base64 --decode > android/app/src/production/google-services.json
        env:
          FIREBASE_OPTIONS_PRODUCTION_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_PRODUCTION_DART_BASE64 }}
          GOOGLE_SERVICES_JSON_PRODUCTION_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_PRODUCTION_BASE64 }}

      - name: Restore release keystore
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore.jks
          cat > android/key.properties <<EOF
          storeFile=release.keystore.jks
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Install dependencies
        run: flutter pub get

      - name: Format generated Firebase config files
        run: dart format lib/firebase_options_production.dart

      - name: Check Dart format
        run: dart format --output=none --set-exit-if-changed lib test pigeons

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # Add Secret: SENTRY_DSN = https://xxx@xxx.ingest.sentry.io/xxx
      - name: Build release APK
        run: |
          flutter build apk --release \
            --flavor production \
            -t lib/main_production.dart \
            --build-name=${{ github.ref_name }} \
            --build-number=${{ github.run_number }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=APP_ENV=production \
            --dart-define=APP_RELEASE=flutter-travel-audio-guide@${{ github.ref_name }}

      - name: Extract changelog for current version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"

          # Extract the corresponding version paragraph from CHANGELOG.md
          # Format: ## v1.0.1 (without parentheses, consistent with git tag format)
          # -v Pass in a variable to avoid shell injection issues
          awk -v version="$VERSION" '
            /^## / {
              if (found) exit
              if ($2 == version) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

          # Provide a clear message when the version cannot be found to avoid blank Release content.
          if [ ! -s release_notes.md ]; then
            echo "No update found for ${VERSION} . Please check that CHANGELOG.md has been updated" > release_notes.md
          fi

          # Write to GITHUB_OUTPUT (multiline standard format)
          {
            echo 'body<<EOF'
            cat release_notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mkdir -p outputs/release
          cp build/app/outputs/flutter-apk/app-production-release.apk \
            outputs/release/travel-audio-guide-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Version ${{ github.ref_name }}

            ### Updates
            ${{ steps.changelog.outputs.body }}

            ### Installation Method
            1. Download `travel-audio-guide-${{ github.ref_name }}.apk`
            2. Enable "Allow installation of apps from unknown sources" on your phone
            3. Install and run
          files: outputs/release/travel-audio-guide-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}