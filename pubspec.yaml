name: flutter_travel_audio_guide
description: "Travel audio guide app with audio download, offline playback, and a built-in media player, built using Riverpod and Clean Architecture."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.3+3

environment:
  sdk: ^3.10.9

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.4.0
  path_provider: ^2.1.2
  path: ^1.9.0
  audioplayers: ^5.2.1
  flutter_widget_from_html_core: ^0.17.2
  talker_flutter: ^4.6.1
  talker_dio_logger: ^4.6.1
  talker_riverpod_logger: ^4.6.1
  cupertino_icons: ^1.0.8
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  # Android/iOS required
  sqlite3_flutter_libs: ^0.5.42
  add_2_calendar: ^3.0.1
  share_plus: ^11.1.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  go_router: ^16.2.0
  sentry_flutter: ^9.7.0
  sentry_dio: ^9.7.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  firebase_core: ^4.10.0
  firebase_analytics: ^12.4.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^26.3.4
  drift_dev: ^2.31.0
  build_runner: ^2.14.1
  # Objective-C was originally indirectly pulled into version 9.3.0 by PathProviderFoundation.
  # This version depends on the Hooks suite, causing Dart Compile to throw an error in the build runner.
  # Downgrade to a version without Hooks to resolve the issue.
  objective_c: ^9.1.0
  # native_toolchain_c also indirectly introduces hooks, and downgrades them accordingly.
  native_toolchain_c: 0.13.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
